openapi: 3.1.0
info:
  title: API Docs Starter
  version: 1.0.0
  description: An API definition used to demonstrate the Fumadocs OpenAPI integration.
servers:
  - url: https://api.example.com/v1
    description: Production
tags:
  - name: text
    x-displayName: Text
    description: Text generation and chat capabilities
  - name: image
    x-displayName: Image
    description: Image generation capabilities
paths:
  /chat/completions:
    post:
      tags:
        - text
      operationId: createChatCompletion
      summary: Create chat completion
      description: Create a chat request with an OpenAI-compatible format.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
            examples:
              simple:
                summary: Simple chat
                value:
                  model: demo-chat
                  messages:
                    - role: user
                      content: Hello, introduce yourself
      responses:
        '200':
          description: Successful request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '401':
          description: Missing or invalid API key
  /embeddings:
    post:
      tags:
        - text
      operationId: createEmbedding
      summary: Create embedding
      description: Convert text into vector representations.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - input
              properties:
                model:
                  type: string
                  example: demo-embedding
                input:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
      responses:
        '200':
          description: Successful request
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        embedding:
                          type: array
                          items:
                            type: number
                        index:
                          type: integer
  /images/generations:
    post:
      tags:
        - image
      operationId: createImage
      summary: Create image generation
      description: Generate images from a prompt.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - prompt
              properties:
                model:
                  type: string
                  example: demo-image
                prompt:
                  type: string
                  example: A mechanical white desk lamp, product photography
                size:
                  type: string
                  enum:
                    - 1024x1024
                    - 1024x768
                    - 768x1024
                  default: 1024x1024
      responses:
        '200':
          description: Successful request
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                          format: uri
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
  schemas:
    ChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - system
            - user
            - assistant
        content:
          type: string
    ChatCompletionRequest:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          example: demo-chat
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        stream:
          type: boolean
          default: false
    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
          example: chatcmpl_123
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                $ref: '#/components/schemas/ChatMessage'
