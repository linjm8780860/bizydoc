name: Sync Feishu and Deploy

on:
  workflow_dispatch:

concurrency:
  group: sync-feishu-and-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync content and push updates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

    steps:
      - name: Check required secrets
        shell: bash
        run: |
          missing=0
          for name in FEISHU_APP_ID FEISHU_APP_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Feishu content
        run: pnpm docs:sync-feishu -- --lang cn --require-credentials

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- content/docs content/docs.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit synced content
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/docs content/docs.json
          git commit -m "chore: sync Feishu docs"

      - name: Push synced content
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: git push origin HEAD:${GITHUB_REF_NAME}
